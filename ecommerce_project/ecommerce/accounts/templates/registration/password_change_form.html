{% extends 'base.html' %}
{% block title %}Changer mon mot de passe{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <h2>Changer mon mot de passe</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Changer</button>
    </form>
  </div>
</div>
{% endblock %}
